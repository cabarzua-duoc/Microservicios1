version: '3.9'

services:

  api-gateway:
    build: ./api-gateway
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - cliente-service
      - compra-service
      - producto-service

  auth-service:
    build: ./auth-service
    ports:
      - "9094:9094"

  cliente-service:
    build: ./cliente-service
    ports:
      - "9091:9091"

  compra-service:
    build: ./compra-service
    ports:
      - "9092:9092"

  producto-service:
    build: ./producto-service
    ports:
      - "9093:9093"